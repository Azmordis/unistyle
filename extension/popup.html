<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>UniStyle</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="t-badge" aria-hidden="true">
        <svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs><linearGradient id="popupBadgeBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3a64a3"/><stop offset="100%" stop-color="#2B4A8B"/></linearGradient></defs>
          <rect width="192" height="192" rx="42" ry="42" fill="url(#popupBadgeBg)"/>
          <path fill-rule="evenodd" fill="#FFFFFF" stroke="#0F1626" stroke-width="2" stroke-linejoin="round" d="M 38,38 L 64,38 L 64,114 A 14 14 0 0 0 78 128 L 114,128 A 14 14 0 0 0 128 114 L 128,38 L 154,38 L 154,118 A 36 36 0 0 1 118 154 L 74,154 A 36 36 0 0 1 38 118 Z"/>
        </svg>
      </div>
      <h1>UniStyle</h1>
      <a href="#" id="fullAppLink" class="full-app-link"
        title="Open the full web app (combo builder, favorites, history, and more)">Open full app ↗</a>
    </header>

    <div class="input-block">
      <div class="cleanup-card" id="cleanupCard">
        <div class="cleanup-head">
          <button class="cleanup-nav" id="cleanupPrev" type="button" aria-label="Previous cleanup tool" title="Previous tool">‹</button>
          <div class="cleanup-titlewrap">
            <span class="cleanup-label" id="cleanupLabel">Format Sentences</span>
            <span class="cleanup-desc" id="cleanupDesc">Fix spacing, capitalization &amp; punctuation</span>
          </div>
          <span class="cleanup-ind" id="cleanupInd">1/3</span>
          <button class="cleanup-nav" id="cleanupNext" type="button" aria-label="Next cleanup tool" title="Next tool">›</button>
        </div>
        <div class="cleanup-preview" id="cleanupPreview"></div>
        <div class="cleanup-actions">
          <button class="cleanup-apply" id="cleanupApply" type="button" title="Apply to the text box">Apply</button>
          <button class="cleanup-copy" id="cleanupCopy" type="button" title="Copy the result">Copy</button>
        </div>
      </div>

      <div class="transform-row">
        <button class="btn-transform" id="capsBtn"   title="UPPERCASE">CAPS</button>
        <button class="btn-transform" id="lowerBtn"  title="lowercase">lower</button>
        <button class="btn-transform" id="titleBtn"  title="Title Case">Title</button>
        <button class="btn-transform btn-chars-toggle" id="charsToggle"
          aria-expanded="false" aria-controls="specialCharsRow"
          title="Insert special characters">Chars ▾</button>
        <button class="btn-clear" id="clearBtn" title="Clear the textarea">Clear</button>
      </div>

      <div class="special-chars-row" id="specialCharsRow"></div>

      <textarea id="inputText" rows="4"
        placeholder="Type or paste text…"
        spellcheck="true"></textarea>

      <div class="char-counter" id="charCounter">0 chars · 0 words</div>
    </div>

    <div class="output-block">
      <div class="output-header">
        <span class="panel-label">Styles</span>
        <input type="search" id="styleSearch" placeholder="Search styles…" />
      </div>
      <div id="outputList" role="list"></div>
    </div>

    <footer class="app-footer">
      <span id="versionLabel" class="version-label"></span>
    </footer>

    <div class="sr-only" id="sr-announce" aria-live="polite"></div>

    <!-- Ko-fi tip link -->
    <div class="kofi-tip">
      <a href="https://ko-fi.com/abaker421" target="_blank" rel="noopener noreferrer" class="kofi-tip-link">☕ Support UniStyle</a>
    </div>
  </div>
  <script src="engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
