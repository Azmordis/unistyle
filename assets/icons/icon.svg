<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background with rounded corners (gold/accent matching the in-app badge color) -->
  <rect width="192" height="192" rx="36" fill="#A07020"/>
  <!-- Decorative gradient overlay for depth -->
  <rect width="192" height="192" rx="36" fill="url(#grad)" opacity="0.4"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#A07020" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Bold "U" letterform: two vertical strokes joined by a bottom bar -->
  <path d="M 42 44 L 66 44 L 66 126 L 126 126 L 126 44 L 150 44 L 150 150 L 42 150 Z" fill="white" opacity="0.95"/>
</svg>
